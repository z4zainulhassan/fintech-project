spring:
  application:
    name: vrtx-ledger
  datasource:
    url: jdbc:postgresql://localhost:5432/vrtx_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

#  configurable fees. Default 3% (300 bps)
ledger:
  fees:
    default-rate-bps: 300

server:
  port: 8080

logging:
  level:
    com.vrtx.ledger: INFO
